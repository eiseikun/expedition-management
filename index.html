<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ねこ海賊団 遠征管理</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.16.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.16.0/firebase-firestore-compat.js"></script>

  <!-- html2canvas for image export -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
  <header>
    <h1>ねこ海賊団 遠征管理</h1>
    <button id="addPlayerBtn">プレイヤー追加</button>
    <button id="exportBtn">レーンをPNG保存</button>
  </header>

  <main id="lanesContainer">
    <div class="lane" data-lane="1"><h2>レーン1</h2><div class="players"></div></div>
    <div class="lane" data-lane="2"><h2>レーン2</h2><div class="players"></div></div>
    <div class="lane" data-lane="3"><h2>レーン3</h2><div class="players"></div></div>
  </main>

  <!-- モーダル -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modalTitle">プレイヤー追加</h2>
      <form id="playerForm">
        <label>名前:<input type="text" id="name" required></label>
        <label>戦力:<input type="number" id="power" required></label>
        <label>レーン:
          <select id="lane">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
          </select>
        </label>

        <!-- 戦術パターン選択 -->
        <label>戦術距離:
          <select id="tacticsDistance">
            <option value="近距離">近距離</option>
            <option value="中距離">中距離</option>
            <option value="遠距離">遠距離</option>
          </select>
        </label>
        <label>戦術パターン:
          <select id="tacticsPattern">
            <option value="バランス">バランス</option>
            <option value="攻撃優先">攻撃優先</option>
            <option value="移動優先">移動優先</option>
            <option value="取得優先">取得優先</option>
          </select>
        </label>

        <!-- 装備 -->
        <label>装備種類:
          <select id="equipmentType">
            <option value="神託">神託</option>
            <option value="グリフォン">グリフォン</option>
            <option value="ドラグーン">ドラグーン</option>
            <option value="キメラ">キメラ</option>
          </select>
        </label>
        <fieldset>
          <legend>カオス設定</legend>
          <label><input type="checkbox" id="chaosWeapon"> 武器</label>
          <label><input type="checkbox" id="chaosAmulet"> お守り</label>
          <label><input type="checkbox" id="chaosRing"> 指輪</label>
          <label><input type="checkbox" id="chaosHelmet"> 兜</label>
          <label><input type="checkbox" id="chaosArmor"> 鎧</label>
          <label><input type="checkbox" id="chaosBoots"> 靴</label>
        </fieldset>

        <!-- ルーン -->
        <label>ルーン鋭利:
          <select id="rune1">
            <option value="-">-</option>
            <option value="レジェンド">レジェンド</option>
            <option value="ミシック">ミシック</option>
          </select>
        </label>
        <label>ルーンアロレ:
          <select id="rune2">
            <option value="-">-</option>
            <option value="レジェンド">レジェンド</option>
            <option value="ミシック">ミシック</option>
          </select>
        </label>

        <!-- 聖物 -->
        <label>聖物 ミシック:<input type="number" id="artifactMythic" value="0"></label>
        <label>聖物 レジェンド:<input type="number" id="artifactLegend" value="0"></label>

        <button type="submit">保存</button>
        <button type="button" id="closeModal">閉じる</button>
      </form>
    </div>
  </div>

  <!-- トースト -->
  <div id="toast" class="toast hidden">保存完了</div>

  <script src="app.js"></script>
</body>
</html>
