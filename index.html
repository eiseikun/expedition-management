<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ねこ海賊団 遠征管理</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
</head>
<body>

<h1>ねこ海賊団 遠征管理</h1>
<div class="mode-indicator" id="modeIndicator">通常モード</div>

<div class="top-buttons" id="topButtons">
  <button onclick="openEditor()">プレイヤー追加</button>
  <button onclick="saveTableImage()">画像保存</button>
</div>

<div class="page-buttons">
  <button onclick="showPage(1)">ページ1</button>
  <button onclick="showPage(2)">ページ2</button>
  <button onclick="showPage(3)">⚙ 設定</button>
</div>

<!-- ===== 1ページ目 ===== -->
<div class="table-container" id="captureArea">
  <table id="playerTable">
    <thead>
      <tr>
        <th class="no-export">選択</th>
        <th>名前</th><th>戦力</th><th>戦術</th><th>装備</th><th>主キャラ</th>
        <th>ルーン</th><th>編成</th><th>聖物%</th><th>並び替え</th><th>編集</th><th>削除</th><th class="no-export">メモ</th>
      </tr>
    </thead>
    <tbody id="playerBody"></tbody>
  </table>
</div>

<!-- ===== 2ページ目 ===== -->
<div class="table-container" id="page2" style="display:none;">
  <h2>遠征記録（週ごと）</h2>
<div class="expedition-controls">
  日付：
  <input id="weekDate" placeholder="金曜日を選択">
  <button onclick="saveWeek()">週を保存（1回戦）</button>
</div>
  <div id="expeditionContainer"></div>
</div>

<!-- ===== 3ページ目：設定 ===== -->
<div class="table-container settings-page" id="page3" style="display:none;">
  <h2>設定</h2>

  <div class="settings-section">
    <h3>ルーン設定（種類と効果）</h3>
    <p class="settings-hint">ここで追加したルーンの種類と効果が、プレイヤー編集画面の「ルーン追加」で選べるようになります。（鋭利・アロレも他のルーンと同じくここで管理します）</p>
    <div class="add-rune-type-row">
      <input id="newRuneTypeName" placeholder="新しいルーン名（例：炎毒の印）">
      <button onclick="addRuneType()">ルーン種類を追加</button>
    </div>
    <div id="runeSettingsContainer"></div>
  </div>
</div>

<!-- 選択したプレイヤーを一括移動するバー -->
<div id="bulkSelectionBar" class="bulk-selection-bar" style="display:none;">
  <span id="bulkSelectionCount">0人選択中</span>
  <select id="bulkSelectionTarget"></select>
  <button onclick="moveSelectedPlayers()">選択した人を移動</button>
  <button class="btn-clear-selection" onclick="clearSelection()">選択解除</button>
</div>

<!-- トースト通知 -->
<div id="toast" class="toast"></div>

<!-- モーダル（1ページ目用） -->
<div id="editor" class="editor" style="display:none;">
  <h2>プレイヤー追加 / 編集</h2>
  <input id="name" placeholder="名前">
  <input id="power" type="number" placeholder="戦力">
  <select id="range">
    <option value="">未設定</option>
    <option>遠距離</option>
    <option>中距離</option>
    <option>近距離</option>
  </select>
  <select id="style">
    <option value="">未設定</option>
    <option>バランス</option>
    <option>攻撃優先</option>
    <option>移動優先</option>
    <option>取得優先</option>
  </select>
  <h3>装備</h3>
  <div id="chaos" class="gear-grid"></div>
  <h3>ルーン</h3>
  <div id="runeContainer"></div>
  <div style="margin-top:10px;">
    <button onclick="addRune()">ルーン追加</button>
  </div>
  <h3>その他</h3>
  <input id="hero" placeholder="主キャラ">
  <input id="formation" placeholder="編成">
  <input id="mythic" placeholder="ミシック数">
  <input id="legend" placeholder="レジェンド数">
  <select id="lane">
    <option value="-1">クラン外</option>
    <option value="0">控え</option>
    <option value="1">レーン1</option>
    <option value="2">レーン2</option>
    <option value="3">レーン3</option>
  </select>
  <div class="editor-footer">
    <button onclick="savePlayer()">保存</button>
    <button onclick="closeEditor()">閉じる</button>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
