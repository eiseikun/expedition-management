<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ねこ海賊団 遠征管理</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</head>

<body>

<h1>ねこ海賊団 遠征管理</h1>

<input id="search" placeholder="🔍 プレイヤー検索" oninput="render()">

<div class="top-buttons">
<button onclick="openEditor()">プレイヤー追加</button>
<button onclick="saveTableImage()">画像保存</button>
</div>

<div class="table-container">
<table id="table">

<thead>
<tr>
<th>名前</th>
<th onclick="sortPlayers()">戦力</th>
<th>戦術</th>
<th>装備</th>
<th>主キャラ</th>
<th>編成</th>
<th>聖物%</th>
</tr>
</thead>

<tbody id="playerBody"></tbody>

</table>
</div>

<!-- 編集 -->
<div id="editor" class="editor">
<div class="editor-box">

<h2>プレイヤー編集</h2>

<input id="name" placeholder="名前">
<input id="power" placeholder="戦力 (例 2.51)">

<select id="range">
<option>遠距離</option>
<option>中距離</option>
<option>近距離</option>
</select>

<select id="style">
<option>バランス</option>
<option>攻撃優先</option>
<option>移動優先</option>
<option>取得優先</option>
</select>

<select id="gear">
<option>神託</option>
<option>グリフォン</option>
<option>ドラグーン</option>
<option>キメラ</option>
</select>

<input id="hero" placeholder="主キャラ">
<input id="formation" placeholder="編成">

<input id="mythic" placeholder="ミシック数">
<input id="legend" placeholder="レジェンド数">

<select id="lane">
<option value="1">レーン1</option>
<option value="2">レーン2</option>
<option value="3">レーン3</option>
<option value="4">控え</option>
</select>

<button onclick="savePlayer()">保存</button>
<button onclick="closeEditor()">閉じる</button>

</div>
</div>

<!-- メニュー -->
<div id="menu" class="menu">
<div class="menu-box">

<h3 id="menuName"></h3>

<p>レーン移動</p>
<button onclick="moveLaneFromMenu(1)">レーン1</button>
<button onclick="moveLaneFromMenu(2)">レーン2</button>
<button onclick="moveLaneFromMenu(3)">レーン3</button>
<button onclick="moveLaneFromMenu(4)">控え</button>

<hr>

<button onclick="editFromMenu()">✏ 編集</button>
<button onclick="deleteFromMenu()">🗑 削除</button>

<button onclick="closeMenu()">閉じる</button>

</div>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
