<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ねこ海賊団 遠征管理</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<h1>ねこ海賊団 遠征管理</h1>

<div class="mode-indicator" id="modeIndicator">通常モード</div>

<div class="top-buttons">
  <button onclick="unlockEdit()">プレイヤー追加</button>
  <button onclick="saveTableImage()">画像保存</button>
</div>

<div class="table-container">
  <table id="playerTable">
    <thead>
      <tr>
        <th>名前</th>
        <th onclick="sortLane('power')">戦力</th>
        <th>戦術</th>
        <th>装備</th>
        <th>主キャラ</th>
        <th>ルーン</th>
        <th>編成</th>
        <th onclick="sortLane('relic')">聖物%</th>
        <th>レーン</th>
        <th>遠征</th>
        <th>編集</th>
        <th>削除</th>
      </tr>
    </thead>
    <tbody id="playerBody"></tbody>
  </table>
</div>

<div id="editor" class="editor" style="display:none;">
  <h2>プレイヤー編集</h2>

  <input id="name" placeholder="名前">
  <input id="power" placeholder="戦力">
  <select id="range">
    <option>遠距離</option>
    <option>中距離</option>
    <option>近距離</option>
  </select>
  <select id="style">
    <option>バランス</option>
    <option>攻撃優先</option>
    <option>移動優先</option>
    <option>取得優先</option>
  </select>

  <select id="gear">
    <option>神託</option>
    <option>グリフォン</option>
    <option>ドラグーン</option>
    <option>キメラ</option>
  </select>
  <label>カオス部位</label>
  <select id="chaos" multiple>
    <option value="武器">武器</option>
    <option value="お守り">お守り</option>
    <option value="指輪">指輪</option>
    <option value="兜">兜</option>
    <option value="鎧">鎧</option>
    <option value="靴">靴</option>
  </select>

  <input id="hero" placeholder="主キャラ">

  <h3>鋭利の矢</h3>
  <select id="sharpQuality">
    <option>none</option>
    <option>legend</option>
    <option>mythic</option>
  </select>
  <select id="sharpEnchant">
    <option>跳ね返り</option>
    <option>クリダメUP</option>
    <option>主武器会心率UP</option>
    <option>主武器UP</option>
  </select>

  <h3>アロレルーン</h3>
  <select id="arrowQuality">
    <option>none</option>
    <option>legend</option>
    <option>mythic</option>
  </select>
  <select id="arrowEnchant">
    <option>固有</option>
    <option>クリダメ軽減</option>
    <option>主武器会心ダメUP</option>
    <option>主武器UP</option>
  </select>

  <input id="formation" placeholder="編成">
  <input id="mythic" placeholder="ミシック数">
  <input id="legend" placeholder="レジェンド数">

  <label>レーン</label>
  <select id="lane">
    <option value="1">レーン1</option>
    <option value="2">レーン2</option>
    <option value="3">レーン3</option>
  </select>

  <button onclick="savePlayer()">保存</button>
  <button onclick="closeEditor()">閉じる</button>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
